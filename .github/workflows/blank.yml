name: Monero Data Build and Upload

# 触发条件：可以根据你的需求修改，比如手动触发、push 触发等
on:
  workflow_dispatch:  # 手动触发

# 配置运行环境
jobs:
  build-and-upload:
    runs-on: ubuntu-latest  # 使用 Ubuntu 最新版 runner
    steps:
      - name: 切换到 root 用户并下载 monero 包
        run: |
          # GitHub Actions 默认已经是 root 权限，无需 sudo -i
          cd /root
          # 下载 monero CLI 包
          curl -L -o monero-linux-x64.tar.bz2 https://downloads.getmonero.org/cli/linux64
          # 验证下载文件是否存在（可选，增加健壮性）
          if [ ! -f "monero-linux-x64.tar.bz2" ]; then
            echo "下载 monero 包失败"
            exit 1
          fi

      - name: 解压 monero 包
        run: |
          cd /root
          tar -xjvf monero-linux-x64.tar.bz2
          # 查找解压后的目录（适配版本号变化）
          MONERO_DIR=$(find /root -maxdepth 1 -type d -name "monero-x86_64-linux-gnu-v*" | head -n 1)
          echo "MONERO_DIR=$MONERO_DIR" >> $GITHUB_ENV

      - name: 运行 monerod 进程 1 分钟
        run: |
          cd ${{ env.MONERO_DIR }}
          # 后台运行 monerod
          ./monerod --data-dir=/root/mm --out-peers 32 --in-peers 64 \
            --add-priority-node=p2pmd.xmrvsbeast.com:18080 \
            --add-priority-node=nodes.hashvault.pro:18080 \
            --enforce-dns-checkpointing --enable-dns-blocklist --prune-blockchain &
          # 记录进程 ID
          MONEROD_PID=$!
          echo "MONEROD_PID=$MONEROD_PID" >> $GITHUB_ENV
          # 等待 1 分钟（60 秒）
          sleep 60
          # 终止 monerod 进程
          kill $MONEROD_PID
          # 等待进程彻底退出
          wait $MONEROD_PID 2>/dev/null || true

      - name: 打包 mm 目录
        run: |
          cd /root
          tar -cJf mm.xz /root/mm
          # 验证打包文件是否存在
          if [ ! -f "mm.xz" ]; then
            echo "打包 mm 目录失败"
            exit 1
          fi

      - name: 上传 mm.xz 文件
        uses: actions/upload-artifact@v4
        with:
          name: monero-mm-data
          path: /root/mm.xz
          retention-days: 7  # 保留 7 天，可根据需求修改
