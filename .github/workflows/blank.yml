name: Monero Process and Upload

on:
  workflow_dispatch:  # 手动触发

jobs:
  monero-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 预留足够超时时间（覆盖5分钟运行+其他步骤）
    
    steps:
      - name: 1. 下载 Monero CLI 安装包
        run: |
          # 创建工作目录并下载文件
          mkdir -p ~/monero-work && cd ~/monero-work
          curl -L -o monero-linux-x64.tar.bz2 https://downloads.getmonero.org/cli/linux64
          
          # 验证下载文件是否存在
          if [ ! -f "monero-linux-x64.tar.bz2" ]; then
            echo "错误：Monero 安装包下载失败"
            exit 1
          fi
          echo "Monero 安装包下载完成"

      - name: 2. 解压 Monero CLI 安装包
        run: |
          cd ~/monero-work
          # 解压文件
          tar -xjvf monero-linux-x64.tar.bz2
          
          # 自动识别解压后的目录（兼容不同版本号）
          MONERO_DIR=$(ls -d monero-x86_64-linux-gnu-*/ | head -n1)
          echo "识别到 Monero 目录：$MONERO_DIR"
          echo "MONERO_DIR=$MONERO_DIR" >> $GITHUB_ENV  # 保存到环境变量供后续使用
          
          # 验证解压结果
          if [ ! -d "$MONERO_DIR" ]; then
            echo "错误：Monero 解压失败"
            exit 1
          fi
          echo "Monero 解压完成"

      - name: 3. 运行 monerod 进程 5 分钟
        run: |
          cd ~/monero-work/${{ env.MONERO_DIR }}
          
          # 创建数据目录
          mkdir -p /root/mm
          
          # 后台运行 monerod 进程，并记录 PID
          echo "启动 monerod 进程..."
          ./monerod --data-dir=/root/mm \
            --out-peers 32 \
            --in-peers 64 \
            --add-priority-node=p2pmd.xmrvsbeast.com:18080 \
            --add-priority-node=nodes.hashvault.pro:18080 \
            --enforce-dns-checkpointing \
            --enable-dns-blocklist \
            --prune-blockchain > monerod.log 2>&1 &
          MONEROD_PID=$!
          echo "monerod 进程 PID：$MONEROD_PID"
          
          # 运行 5 分钟（300 秒）
          echo "等待 5 分钟（300 秒）..."
          sleep 300
          
          # 终止 monerod 进程
          echo "终止 monerod 进程..."
          kill $MONEROD_PID || true
          # 等待进程彻底退出
          sleep 5
          echo "monerod 进程已终止，运行日志："
          cat monerod.log

      - name: 4. 压缩 /root/mm 目录为 mm.xz
        run: |
          # 压缩目录，使用高压缩级别，显示进度
          echo "开始压缩 /root/mm 目录..."
          tar -cJvf mm.xz /root/mm
          
          # 验证压缩包
          if [ ! -f "mm.xz" ]; then
            echo "错误：压缩文件生成失败"
            exit 1
          fi
          # 显示文件大小
          ls -lh mm.xz
          echo "压缩完成，文件：mm.xz"

      - name: 5. 上传 mm.xz 文件
        uses: actions/upload-artifact@v4
        with:
          name: monero-mm-data
          path: mm.xz
          retention-days: 7  # 保留 7 天，可根据需要调整
