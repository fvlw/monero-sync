name: Monero Node Data Pack

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 总超时设为4小时
    
    steps:
      - name: Step 1 - 下载 Monero CLI 包
        run: |
          cd /home/runner/
          curl --retry 3 --connect-timeout 30 -L -o monero-linux-x64.tar.bz2 https://downloads.getmonero.org/cli/linux64

      - name: Step 2 - 解压 Monero 包
        run: |
          cd /home/runner/
          tar -xjvf monero-linux-x64.tar.bz2

      - name: Step 3 - 安装 GitHub CLI 并下载指定 artifacts
        run: |
          cd /home/runner/
          # 1. 安装 GitHub CLI（gh）- GitHub 官方工具，支持正确下载 artifacts
          type -p gh >/dev/null || (sudo apt update && sudo apt install -y gh)
          
          # 2. 下载指定 artifacts（关键：用 gh 替代 curl，处理跳转/权限）
          # 参数说明：
          #   repo: 仓库名（fvlw/monero-sync）
          #   run-id: 运行ID（22612485345）
          #   artifact-id: 制品ID（5738145565）
          echo "📥 开始下载 monero-sync artifacts 包..."
          gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/fvlw/monero-sync/actions/runs/22612485345/artifacts/5738145565 \
            | jq -r '.archive_download_url' \
            | xargs curl --retry 3 --connect-timeout 30 -L -o monero-sync-artifact.zip
          
          # 检查下载是否成功（文件大小需大于 1KB，排除空文件）
          if [ ! -f "monero-sync-artifact.zip" ] || [ $(stat -c%s "monero-sync-artifact.zip") -lt 1024 ]; then
            echo "❌ 错误：artifacts 包下载失败，文件大小异常"
            ls -lh monero-sync-artifact.zip || echo "文件不存在"
            cat monero-sync-artifact.zip || echo "无文件内容"
            exit 1
          fi
          
          # 3. 解压压缩包
          echo "📦 开始解压 artifacts 包..."
          unzip -q monero-sync-artifact.zip
          
          # 4. 检查解压是否成功
          if [ $? -ne 0 ]; then
            echo "❌ 错误：artifacts 包解压失败"
            exit 1
          fi
          
          # 5. 删除压缩包，释放磁盘空间
          echo "🗑️ 删除 artifacts 压缩包..."
          rm -f monero-sync-artifact.zip
          
          # 6. 验证解压结果
          echo "✅ 解压完成，当前目录文件："
          ls -lh

      - name: Step 4 - 运行 monerod 节点 2 小时（守护进程模式）
        run: |
          # 创建日志和数据目录
          mkdir -p /home/runner/monero-logs /home/runner/mm
          cd /home/runner/monero-x86_64-linux-gnu-v0.18.4.5/
          
          # 清理残留进程
          pkill -f monerod 2>/dev/null || true
          sleep 2
          
          # 启动 monerod 守护进程（保留原始参数）
          ./monerod --detach \
            --data-dir=/home/runner/mm \
            --out-peers 32 --in-peers 64 \
            --add-priority-node=p2pmd.xmrvsbeast.com:18080 \
            --add-priority-node=nodes.hashvault.pro:18080 \
            --enforce-dns-checkpointing --enable-dns-blocklist --prune-blockchain \
            --log-file=/home/runner/monerod.log \
            < /dev/null > /dev/null 2>&1
          
          # 等待进程完全启动
          sleep 5
          MONEROD_PID=$(pgrep monerod || echo "0")
          
          if [ "$MONEROD_PID" = "0" ]; then
            echo "错误：monerod 进程启动失败！"
            cat /home/runner/monerod.log || echo "无日志文件"
            exit 1
          fi
          
          echo "✅ monerod 启动成功，PID: $MONEROD_PID"
          ps -ef | grep monerod | grep -v grep
          
          # 运行 2 小时（7200 秒）
          echo "⏳ 让 monerod 运行 2 小时..."
          sleep 7200
          
          # 终止进程
          if ps -p $MONEROD_PID > /dev/null; then
            echo "🛑 终止 monerod 进程 (PID: $MONEROD_PID)"
            kill $MONEROD_PID
            sleep 5
            kill -9 $MONEROD_PID 2>/dev/null || true
          else
            echo "⚠️ monerod 进程已自行退出，日志末尾："
            tail -50 /home/runner/monerod.log
          fi

      - name: Step 5 - 直接上传 mm 目录
        uses: actions/upload-artifact@v4
        with:
          name: monero-node-data
          path: /home/runner/mm/**  # 递归上传目录下所有文件
          retention-days: 7
          if-no-files-found: error
          
      - name: 上传 monerod 日志
        uses: actions/upload-artifact@v4
        with:
          name: monerod-logs
          path: /home/runner/monerod.log
          retention-days: 7
