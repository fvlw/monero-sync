name: Check Download Path
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 查看默认工作目录
        run: |
          # 打印当前工作目录
          pwd
          # 打印工作目录的环境变量（GitHub 内置）
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"

      - name: 方式1：默认目录下载
        run: |
          # 在默认目录下载
          curl -L -o monero-linux-x64.tar.bz2 https://downloads.getmonero.org/cli/linux64
          # 验证文件位置
          ls -l $GITHUB_WORKSPACE/monero-linux-x64.tar.bz2

      - name: 方式2：指定绝对路径下载（推荐，避免路径混乱）
        run: |
          # 创建固定目录
          mkdir -p /home/runner/monero_download
          # 直接指定绝对路径下载，无需关心当前目录
          curl -L -o /home/runner/monero_download/monero-linux-x64.tar.bz2 https://downloads.getmonero.org/cli/linux64
          # 验证文件位置
          ls -l /home/runner/monero_download/monero-linux-x64.tar.bz2
