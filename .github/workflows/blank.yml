name: Setup SSH and Tailscale

on:
  workflow_dispatch:  # 手动触发工作流
  # 你也可以添加定时触发，比如每天运行：
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  setup-server:
    runs-on: ubuntu-latest  # 使用 GitHub 托管的 Ubuntu 运行器
    timeout-minutes: 0      # 取消超时限制（关键：让任务一直运行）
    
    steps:
      - name: 1. 配置 SSH 允许 root 密钥登录
        run: |
          # 创建 SSH 目录并设置正确权限
          sudo mkdir -p /root/.ssh
          sudo chmod 700 /root/.ssh
          
          # 将 PUBLIC_KEY 写入 authorized_keys 文件
          echo "${{ secrets.PUBLIC_KEY }}" | sudo tee /root/.ssh/authorized_keys
          sudo chmod 600 /root/.ssh/authorized_keys
          sudo chown root:root /root/.ssh/authorized_keys
          
          # 修改 SSH 配置，允许 root 登录和密钥登录
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          
          # 重启 SSH 服务使配置生效
          sudo systemctl restart sshd
          
          # 验证 SSH 配置
          sudo sshd -t  # 检查配置语法
          echo "SSH 配置完成，已允许 root 密钥登录"

      - name: 2. 安装并启动 Tailscale
        env:
          TAILSCALE_KEY: ${{ secrets.TAILSCALE_KEY }}
        run: |
          # 安装 Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          
          # 使用授权密钥启动 Tailscale
          sudo tailscale up --auth-key=$TAILSCALE_KEY
          
          # 验证 Tailscale 状态
          sudo tailscale status
          echo "Tailscale 安装并启动成功"

      - name: 3. 保持 GitHub Actions 任务持续运行
        run: |
          # 使用无限循环保持任务运行（不会终止）
          echo "开始保持任务运行，按 Ctrl+C 可终止"
          while true; do
            sleep 3600  # 每小时休眠一次，减少资源占用
          done
