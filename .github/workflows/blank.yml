name: Monero Node Data Pack

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - 下载 Monero CLI 包
        run: |
          cd /home/runner/
          curl --retry 3 --connect-timeout 30 -L -o monero-linux-x64.tar.bz2 https://downloads.getmonero.org/cli/linux64

      - name: Step 2 - 解压 Monero 包
        run: |
          cd /home/runner/
          tar -xjvf monero-linux-x64.tar.bz2

      - name: Step 3 - 运行 monerod 节点 1 分钟
        run: |
          # 创建日志目录
          mkdir -p /home/runner/monero-logs
          cd /home/runner/monero-x86_64-linux-gnu-v0.18.4.5/
          
          # 启动 monerod，后台运行并记录日志和 PID
          ./monerod --data-dir=/home/runner/mm --out-peers 32 --in-peers 64 \
            --add-priority-node=p2pmd.xmrvsbeast.com:18080 \
            --add-priority-node=nodes.hashvault.pro:18080 \
            --enforce-dns-checkpointing --enable-dns-blocklist --prune-blockchain \
            --log-file=/home/runner/monero-logs/monerod.log &
          MONEROD_PID=$!
          echo "Monerod 启动，PID: $MONEROD_PID"
          
          # 等待 1 分钟（60 秒）
          sleep 60
          
          # 检查进程是否还存在，存在才终止
          if ps -p $MONEROD_PID > /dev/null; then
            echo "终止 monerod 进程 (PID: $MONEROD_PID)"
            kill $MONEROD_PID
            sleep 5
            # 再次检查，若仍存在则强制终止
            if ps -p $MONEROD_PID > /dev/null; then
              kill -9 $MONEROD_PID 2>/dev/null || true
            fi
          else
            echo "monerod 进程 (PID: $MONEROD_PID) 已自行退出，无需终止"
          fi
          
          # 打印日志末尾内容，方便排查问题
          echo "=== Monerod 日志末尾 50 行 ==="
          tail -50 /home/runner/monero-logs/monerod.log || echo "日志文件不存在"

      - name: Step 4 - 打包数据目录
        run: |
          cd /home/runner/
          tar -cJf mm.xz /home/runner/mm

      - name: Step 5 - 上传 mm.xz 文件
        uses: actions/upload-artifact@v4
        with:
          name: monero-node-data
          path: /home/runner/mm.xz
          retention-days: 7
          
      - name: 上传 monerod 日志（用于排查问题）
        uses: actions/upload-artifact@v4
        with:
          name: monerod-logs
          path: /home/runner/monero-logs/
          retention-days: 7
